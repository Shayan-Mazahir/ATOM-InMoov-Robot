<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InMoov STL Files</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            color: #222;
            background: #fff;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            border-bottom: 2px solid #222;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.4rem;
        }

        header p {
            color: #666;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .breadcrumb a {
            color: #0066cc;
            text-decoration: none;
            cursor: pointer;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .status {
            font-size: 0.78rem;
            color: #999;
            margin-bottom: 0.75rem;
            min-height: 1.2em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        td {
            padding: 0.6rem 0.5rem;
            vertical-align: middle;
        }

        td:first-child {
            width: 24px;
            text-align: center;
        }

        td:last-child {
            width: 80px;
            text-align: right;
            color: #666;
            font-size: 0.8rem;
        }

        .name {
            color: #0066cc;
            text-decoration: none;
            cursor: pointer;
        }

        .name:hover {
            text-decoration: underline;
        }

        .loading {
            color: #999;
            font-size: 0.85rem;
            padding: 2rem 0;
            text-align: center;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10;
            align-items: center;
            justify-content: center;
        }

        .overlay.open {
            display: flex;
        }

        .modal {
            background: #fff;
            border: 1px solid #ccc;
            width: 90%;
            max-width: 640px;
            border-radius: 4px;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .modal-header button {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #666;
        }

        #canvas-container {
            width: 100%;
            height: 360px;
            background: #f0f0f0;
            position: relative;
        }

        #canvas-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        #canvas-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.85rem;
        }

        .modal-footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #666;
        }

        .dl {
            background: #222;
            color: #fff;
            padding: 0.4rem 0.9rem;
            border-radius: 3px;
            text-decoration: none;
            font-size: 0.8rem;
        }

        footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            font-size: 0.8rem;
            color: #999;
        }

        footer a {
            color: #0066cc;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>ATOM — STL Files</h1>
        <p>InMoov Robot Parts · <a href="https://github.com/Shayan-Mazahir/ATOM-InMoov-Robot"
                style="color:#0066cc">GitHub</a> · raza.sh</p>
    </header>

    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="status" id="status"></div>

    <table>
        <tbody id="tbody">
            <tr>
                <td colspan="3" class="loading">Loading...</td>
            </tr>
        </tbody>
    </table>

    <div class="overlay" id="overlay">
        <div class="modal">
            <div class="modal-header">
                <span id="modal-name">file.stl</span>
                <button onclick="closeModal()">✕</button>
            </div>
            <div id="canvas-container">
                <div id="canvas-loading">Loading model...</div>
            </div>
            <div class="modal-footer">
                <span id="modal-path"></span>
                <a class="dl" id="dl-btn" download>Download</a>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://inmoov.fr">InMoov by Gaël Langevin</a> ·
        Built by <a href="https://github.com/Shayan-Mazahir">Raza</a>
    </footer>

    <script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ─── Config ───────────────────────────────────────────────────────────────
        const REPO = "Shayan-Mazahir/ATOM-InMoov-Robot";
        const ROOT_PATH = "stl-files";
        const API = `https://api.github.com/repos/${REPO}`;
        const RAW = `https://raw.githubusercontent.com/${REPO}/main`;
        const CACHE_KEY = "atom_stl_cache";
        const COMMIT_KEY = "atom_last_commit";
        const TIME_KEY = "atom_last_check";
        const CHECK_INTERVAL = 60 * 60 * 1000;

        let currentPath = ROOT_PATH;
        let cachedContents = {};

        // ─── Three.js viewer ──────────────────────────────────────────────────────
        let renderer, scene, camera, controls, animId;

        function initThree() {
            const container = document.getElementById('canvas-container');
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setClearColor(0xf0f0f0);
            container.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 10000);
            camera.position.set(0, 0, 200);

            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(1, 2, 3);
            scene.add(dir);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            function animate() {
                animId = requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function loadSTL(url) {
            // Clear existing meshes
            scene.children = scene.children.filter(c => c.isLight || c.isAmbientLight);

            document.getElementById('canvas-loading').style.display = 'flex';

            const loader = new STLLoader();
            loader.load(url, (geometry) => {
                geometry.computeBoundingBox();
                const box = geometry.boundingBox;
                const center = new THREE.Vector3();
                box.getCenter(center);
                geometry.translate(-center.x, -center.y, -center.z);

                const size = new THREE.Vector3();
                box.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.set(0, 0, maxDim * 1.8);
                controls.reset();

                const material = new THREE.MeshPhongMaterial({ color: 0x909090, specular: 0x111111, shininess: 30 });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);

                document.getElementById('canvas-loading').style.display = 'none';
            }, undefined, () => {
                document.getElementById('canvas-loading').textContent = 'Failed to load model';
            });
        }

        function destroyThree() {
            if (animId) cancelAnimationFrame(animId);
            if (renderer) {
                renderer.dispose();
                const container = document.getElementById('canvas-container');
                if (renderer.domElement.parentNode === container) {
                    container.removeChild(renderer.domElement);
                }
            }
            renderer = scene = camera = controls = animId = null;
        }

        // ─── Cache ────────────────────────────────────────────────────────────────
        function saveCache(contents, commitSha) {
            localStorage.setItem(CACHE_KEY, JSON.stringify(contents));
            localStorage.setItem(COMMIT_KEY, commitSha);
            localStorage.setItem(TIME_KEY, Date.now().toString());
        }

        function loadCache() {
            try {
                return {
                    contents: JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'),
                    commitSha: localStorage.getItem(COMMIT_KEY),
                    lastCheck: parseInt(localStorage.getItem(TIME_KEY) || '0')
                };
            } catch {
                return { contents: null, commitSha: null, lastCheck: 0 };
            }
        }

        // ─── GitHub API ───────────────────────────────────────────────────────────
        async function getLatestCommit() {
            const r = await fetch(`${API}/commits?path=${ROOT_PATH}&per_page=1`);
            const data = await r.json();
            return data[0]?.sha || null;
        }

        async function fetchContents(path) {
            const r = await fetch(`${API}/contents/${path}`);
            if (!r.ok) return [];
            return await r.json();
        }

        async function fetchAllContents(path, store) {
            const items = await fetchContents(path);
            store[path] = items;
            for (const item of items) {
                if (item.type === 'dir') {
                    const sub = await fetchContents(item.path);
                    store[item.path] = sub;
                }
            }
            return store;
        }

        // ─── Init ─────────────────────────────────────────────────────────────────
        async function init() {
            setStatus("Checking cache...");
            const { contents, commitSha, lastCheck } = loadCache();
            const now = Date.now();
            const hourPassed = (now - lastCheck) > CHECK_INTERVAL;

            if (contents && !hourPassed) {
                cachedContents = contents;
                setStatus(`Cached · last checked ${timeSince(lastCheck)} ago`);
                render();
                return;
            }

            setStatus("Checking for updates...");
            try {
                const latestSha = await getLatestCommit();
                if (contents && latestSha === commitSha) {
                    cachedContents = contents;
                    localStorage.setItem(TIME_KEY, now.toString());
                    setStatus(`No changes · last commit: ${latestSha?.slice(0, 7)}`);
                    render();
                    return;
                }
                setStatus("Fetching files from GitHub...");
                cachedContents = {};
                await fetchAllContents(ROOT_PATH, cachedContents);
                saveCache(cachedContents, latestSha);
                setStatus(`Updated · commit: ${latestSha?.slice(0, 7)}`);
                render();
            } catch (e) {
                if (contents) {
                    cachedContents = contents;
                    setStatus("Offline — showing cached files");
                    render();
                } else {
                    setStatus("Failed to load. Check your connection.");
                    document.getElementById('tbody').innerHTML =
                        '<tr><td colspan="3" class="loading">Could not load files.</td></tr>';
                }
            }
        }

        // ─── Render ───────────────────────────────────────────────────────────────
        function render() {
            const items = cachedContents[currentPath] || [];
            const parts = currentPath.split('/');
            let bc = '';
            parts.forEach((part, i) => {
                const partPath = parts.slice(0, i + 1).join('/');
                if (i < parts.length - 1) bc += `<a onclick="navigate('${partPath}')">${part}</a> / `;
                else bc += part;
            });
            document.getElementById('breadcrumb').innerHTML = bc;

            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';

            if (currentPath !== ROOT_PATH) {
                const parentPath = currentPath.split('/').slice(0, -1).join('/');
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>📁</td><td><a class="name" onclick="navigate('${parentPath}')">.. (back)</a></td><td></td>`;
                tbody.appendChild(tr);
            }

            if (items.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="3" class="loading">Empty folder</td>`;
                tbody.appendChild(tr);
                return;
            }

            const sorted = [...items].sort((a, b) => {
                if (a.type === b.type) return a.name.localeCompare(b.name);
                return a.type === 'dir' ? -1 : 1;
            });

            sorted.forEach(item => {
                const tr = document.createElement('tr');
                if (item.type === 'dir') {
                    const subItems = cachedContents[item.path];
                    const count = subItems ? subItems.length : '...';
                    tr.innerHTML = `<td>📁</td><td><a class="name" onclick="navigate('${item.path}')">${item.name}</a></td><td>${count} items</td>`;
                } else if (item.name.toLowerCase().endsWith('.stl')) {
                    const rawUrl = `${RAW}/${item.path}`;
                    tr.innerHTML = `<td>⬡</td><td><a class="name" onclick="openModal('${item.name}','${rawUrl}','${item.path}')">${item.name}</a></td><td>STL</td>`;
                } else {
                    tr.innerHTML = `<td>📄</td><td>${item.name}</td><td>${formatSize(item.size)}</td>`;
                }
                tbody.appendChild(tr);
            });
        }

        window.navigate = async function (path) {
            currentPath = path;
            if (!cachedContents[path]) {
                setStatus("Loading...");
                try {
                    const items = await fetchContents(path);
                    cachedContents[path] = items;
                    const { commitSha } = loadCache();
                    saveCache(cachedContents, commitSha);
                    setStatus("");
                } catch {
                    setStatus("Failed to load folder");
                }
            }
            render();
        };

        window.openModal = function (name, url, path) {
            document.getElementById('modal-name').textContent = name;
            document.getElementById('modal-path').textContent = path;
            document.getElementById('dl-btn').href = url;
            document.getElementById('dl-btn').download = name;
            document.getElementById('canvas-loading').textContent = 'Loading model...';
            document.getElementById('canvas-loading').style.display = 'flex';
            document.getElementById('overlay').classList.add('open');

            if (!renderer) initThree();
            loadSTL(url);
        };

        window.closeModal = function () {
            document.getElementById('overlay').classList.remove('open');
            destroyThree();
        };

        document.getElementById('overlay').addEventListener('click', e => {
            if (e.target === document.getElementById('overlay')) window.closeModal();
        });

        function setStatus(msg) { document.getElementById('status').textContent = msg; }

        function formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(0)} KB`;
            return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
        }

        function timeSince(ts) {
            const mins = Math.floor((Date.now() - ts) / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m`;
            return `${Math.floor(mins / 60)}h`;
        }

        init();
    </script>
</body>

</html>
