<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATOM — STL Files</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            color: #222;
            background: #fff;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            border-bottom: 2px solid #222;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.4rem;
        }

        header p {
            color: #666;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .breadcrumb a {
            color: #0066cc;
            text-decoration: none;
            cursor: pointer;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .status {
            font-size: 0.78rem;
            color: #999;
            margin-bottom: 0.75rem;
            min-height: 1.2em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        td {
            padding: 0.6rem 0.5rem;
            vertical-align: middle;
        }

        td:first-child {
            width: 24px;
            text-align: center;
        }

        td:last-child {
            width: 80px;
            text-align: right;
            color: #666;
            font-size: 0.8rem;
        }

        .name {
            color: #0066cc;
            text-decoration: none;
            cursor: pointer;
        }

        .name:hover {
            text-decoration: underline;
        }

        .loading {
            color: #999;
            font-size: 0.85rem;
            padding: 2rem 0;
            text-align: center;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10;
            align-items: center;
            justify-content: center;
        }

        .overlay.open {
            display: flex;
        }

        .modal {
            background: #fff;
            border: 1px solid #ccc;
            width: 90%;
            max-width: 640px;
            border-radius: 4px;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .modal-header button {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #666;
        }

        model-viewer {
            width: 100%;
            height: 360px;
            background: #f5f5f5;
        }

        .modal-footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #666;
        }

        .dl {
            background: #222;
            color: #fff;
            padding: 0.4rem 0.9rem;
            border-radius: 3px;
            text-decoration: none;
            font-size: 0.8rem;
        }

        footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            font-size: 0.8rem;
            color: #999;
        }

        footer a {
            color: #0066cc;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>ATOM — STL Files</h1>
        <p>InMoov Robot Parts · <a href="https://github.com/Shayan-Mazahir/ATOM-InMoov-Robot"
                style="color:#0066cc">GitHub</a> · raza.sh</p>
    </header>

    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="status" id="status"></div>

    <table>
        <tbody id="tbody">
            <tr>
                <td colspan="3" class="loading">Loading...</td>
            </tr>
        </tbody>
    </table>

    <div class="overlay" id="overlay">
        <div class="modal">
            <div class="modal-header">
                <span id="modal-name">file.stl</span>
                <button onclick="closeModal()">✕</button>
            </div>
            <model-viewer id="viewer" camera-controls auto-rotate shadow-intensity="1"></model-viewer>
            <div class="modal-footer">
                <span id="modal-path"></span>
                <a class="dl" id="dl-btn" download>Download</a>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://inmoov.fr">InMoov by Gaël Langevin</a> ·
        Built by <a href="https://github.com/Shayan-Mazahir">Raza</a>
    </footer>

    <script>
        const REPO = "Shayan-Mazahir/ATOM-InMoov-Robot";
        //const ROOT_PATH = "stl-files";
        const ROOT_PATH = "";
        const API = `https://api.github.com/repos/${REPO}`;
        //const RAW = `https://raw.githubusercontent.com/${REPO}/main`;
        const RAW = `https://raw.githubusercontent.com/${REPO}/main/stl-files`;
        const CACHE_KEY = "atom_stl_cache";
        const COMMIT_KEY = "atom_last_commit";
        const TIME_KEY = "atom_last_check";
        const CHECK_INTERVAL = 60 * 60 * 1000; // 1 hour in ms

        let currentPath = ROOT_PATH;
        let cachedContents = {}; // path -> array of items

        // ─── Cache helpers ────────────────────────────────────────────────────────────
        function saveCache(contents, commitSha) {
            localStorage.setItem(CACHE_KEY, JSON.stringify(contents));
            localStorage.setItem(COMMIT_KEY, commitSha);
            localStorage.setItem(TIME_KEY, Date.now().toString());
        }

        function loadCache() {
            try {
                return {
                    contents: JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'),
                    commitSha: localStorage.getItem(COMMIT_KEY),
                    lastCheck: parseInt(localStorage.getItem(TIME_KEY) || '0')
                };
            } catch {
                return { contents: null, commitSha: null, lastCheck: 0 };
            }
        }

        // ─── GitHub API ───────────────────────────────────────────────────────────────
        async function getLatestCommit() {
            const r = await fetch(`${API}/commits?path=${ROOT_PATH}&per_page=1`);
            const data = await r.json();
            return data[0]?.sha || null;
        }

        async function fetchContents(path) {
            const r = await fetch(`${API}/contents/${path}`);
            if (!r.ok) return [];
            return await r.json();
        }

        async function fetchAllContents(path, store) {
            const items = await fetchContents(path);
            store[path] = items;
            // Prefetch one level of subfolders
            for (const item of items) {
                if (item.type === 'dir') {
                    const sub = await fetchContents(item.path);
                    store[item.path] = sub;
                }
            }
            return store;
        }

        // ─── Init ────────────────────────────────────────────────────────────────────
        async function init() {
            setStatus("Checking cache...");
            const { contents, commitSha, lastCheck } = loadCache();
            const now = Date.now();
            const hourPassed = (now - lastCheck) > CHECK_INTERVAL;

            if (contents && !hourPassed) {
                // Use cache — no API call needed
                cachedContents = contents;
                setStatus(`Cached · last checked ${timeSince(lastCheck)} ago`);
                render();
                return;
            }

            // Hour passed — check if commit changed
            setStatus("Checking for updates...");
            try {
                const latestSha = await getLatestCommit();

                if (contents && latestSha === commitSha) {
                    // Same commit — use cache, update check time only
                    cachedContents = contents;
                    localStorage.setItem(TIME_KEY, now.toString());
                    setStatus(`No changes · last commit: ${latestSha?.slice(0, 7)}`);
                    render();
                    return;
                }

                // New commit or first load — fetch fresh
                setStatus("Fetching files from GitHub...");
                cachedContents = {};
                await fetchAllContents(ROOT_PATH, cachedContents);
                saveCache(cachedContents, latestSha);
                setStatus(`Updated · commit: ${latestSha?.slice(0, 7)}`);
                render();

            } catch (e) {
                if (contents) {
                    // API failed but we have cache — use it
                    cachedContents = contents;
                    setStatus("Offline — showing cached files");
                    render();
                } else {
                    setStatus("Failed to load. Check your connection.");
                    document.getElementById('tbody').innerHTML =
                        '<tr><td colspan="3" class="loading">Could not load files.</td></tr>';
                }
            }
        }

        // ─── Render ───────────────────────────────────────────────────────────────────
        function render() {
            const items = cachedContents[currentPath] || [];

            // Breadcrumb
            const parts = currentPath.split('/');
            let bc = '';
            parts.forEach((part, i) => {
                const partPath = parts.slice(0, i + 1).join('/');
                if (i < parts.length - 1) {
                    bc += `<a onclick="navigate('${partPath}')">${part}</a> / `;
                } else {
                    bc += part;
                }
            });
            document.getElementById('breadcrumb').innerHTML = bc;

            // Table
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';

            // Back button
            if (currentPath !== ROOT_PATH) {
                const parentPath = currentPath.split('/').slice(0, -1).join('/');
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>📁</td><td><a class="name" onclick="navigate('${parentPath}')">.. (back)</a></td><td></td>`;
                tbody.appendChild(tr);
            }

            if (items.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="3" class="loading">Empty folder</td>`;
                tbody.appendChild(tr);
                return;
            }

            // Sort: folders first, then files
            const sorted = [...items].sort((a, b) => {
                if (a.type === b.type) return a.name.localeCompare(b.name);
                return a.type === 'dir' ? -1 : 1;
            });

            sorted.forEach(item => {
                const tr = document.createElement('tr');

                if (item.type === 'dir') {
                    const subItems = cachedContents[item.path];
                    const count = subItems ? subItems.length : '...';
                    tr.innerHTML = `
        <td>📁</td>
        <td><a class="name" onclick="navigate('${item.path}')">${item.name}</a></td>
        <td>${count} items</td>`;
                } else if (item.name.toLowerCase().endsWith('.stl')) {
                    const rawUrl = `${RAW}/${item.path}`;
                    tr.innerHTML = `
        <td>⬡</td>
        <td><a class="name" onclick="openModal('${item.name}','${rawUrl}','${item.path}')">${item.name}</a></td>
        <td>STL</td>`;
                } else {
                    tr.innerHTML = `
        <td>📄</td>
        <td>${item.name}</td>
        <td>${formatSize(item.size)}</td>`;
                }
                tbody.appendChild(tr);
            });
        }

        async function navigate(path) {
            currentPath = path;
            // Fetch if not cached
            if (!cachedContents[path]) {
                setStatus("Loading...");
                try {
                    const items = await fetchContents(path);
                    cachedContents[path] = items;
                    // Update cache
                    const { commitSha } = loadCache();
                    saveCache(cachedContents, commitSha);
                    setStatus("");
                } catch {
                    setStatus("Failed to load folder");
                }
            }
            render();
        }

        // ─── Modal ────────────────────────────────────────────────────────────────────
        function openModal(name, url, path) {
            document.getElementById('modal-name').textContent = name;
            document.getElementById('modal-path').textContent = path;
            document.getElementById('viewer').setAttribute('src', url);
            document.getElementById('dl-btn').href = url;
            document.getElementById('dl-btn').download = name;
            document.getElementById('overlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('overlay').classList.remove('open');
            document.getElementById('viewer').removeAttribute('src');
        }

        document.getElementById('overlay').addEventListener('click', e => {
            if (e.target === document.getElementById('overlay')) closeModal();
        });

        // ─── Helpers ──────────────────────────────────────────────────────────────────
        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        function formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(0)} KB`;
            return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
        }

        function timeSince(ts) {
            const mins = Math.floor((Date.now() - ts) / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m`;
            return `${Math.floor(mins / 60)}h`;
        }

        init();
    </script>
</body>

</html>
